<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Card - HNG Stage 0</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <article data-testid="test-todo-card" class="todo-card">
    <div class="card-header">
      <h2 data-testid="test-todo-title">HNG Stage 0 Task</h2>
    </div>
    <div class="card-body">
      <p data-testid="test-todo-description" class="description">
        A clean, modern and testable Todo Card component </p>
      <div class="info-row">
        <span data-testid="test-todo-priority" class="priority">High</span>
        <span data-testid="test-todo-status" class="status">In Progress</span>
      </div>
      <div class="due-date">
        <strong>Due Date:</strong> 
        <span data-testid="test-todo-due-date">April 16, 2026</span>
      </div>
      <div data-testid="test-todo-time-remaining" class="time-remaining">
        Calculating...
      </div>
      <div data-testid="test-todo-tags" class="tags">
        <span data-testid="test-todo-tag-work" class="tag">Work</span>
        <span data-testid="test-todo-tag-urgent" class="tag">Urgent</span>
        <span class="tag">HNG</span>
      </div>
      <div class="checkbox-container">
        <input type="checkbox" id="complete-toggle" data-testid="test-todo-complete-toggle" onchange="toggleComplete()">
        <label for="complete-toggle">Mark as Completed</label>
      </div>
      <div class="actions">
        <button class="edit-btn" data-testid="test-todo-edit-button" onclick="editTodo()">Edit</button>
        <button class="delete-btn" data-testid="test-todo-delete-button" onclick="deleteTodo()">Delete</button>
      </div>
    </div>
  </article>
  <script src="./index.js"></script>
</body>
</html>
